name: test Nifty 50 CSV

on:
  schedule:
    - cron: '30 19 * * *'  # 1:00 AM IST
    - cron: '30 0 * * *'   # 6:00 AM IST
    - cron: '30 2 * * *'   # 8:00 AM IST
  workflow_dispatch:

jobs:
  fetch_csv:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Fetch CSV and Inject Live Timestamp Column
      run: |
        # 1. Official CSV download karo
        curl -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
             "https://www.niftyindices.com/IndexConstituent/ind_nifty50list.csv" > temp.csv
        
        # 2. Indian Timezone (IST) nikalna
        CURRENT_TIME=$(env TZ=Asia/Kolkata date "+%Y-%m-%d %H:%M:%S IST")
        
        # 3. Pehli line (Header) me ",Fetch_Time" jodna
        sed "1s/$/,,Fetch_Time/" temp.csv > ind_nifty50list.csv
        
        # 4. Baki saari rows me live timestamp jodna aur final file banana
        sed "1d; s/$/,$CURRENT_TIME/" temp.csv >> ind_nifty50list.csv
        rm temp.csv
        
        echo "Successfully injected timestamp: $CURRENT_TIME"

    - name: Commit and Force Push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add ind_nifty50list.csv
        
        # Is baar message me humne "With Timestamp" dala hai taaki pehchan sako
        git commit -m "Official Nifty 50 CSV Force Updated With Timestamp" || exit 0
        git push origin main --force
