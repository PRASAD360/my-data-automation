name: Auto Fetch Nifty 50 CSV

on:
  schedule:
    - cron: '30 19 * * *'  # 1. Raat ke exact 1:00 AM IST par chalega
    - cron: '30 0 * * *'   # 2. Subah ke exact 6:00 AM IST par chalega
    - cron: '30 2 * * *'   # 3. Subah ke exact 8:00 AM IST par chalega
  workflow_dispatch:

jobs:
  fetch_csv:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Fetch Official Nifty 50 CSV
      run: |
        # Official CSV download karna
        curl -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
             "https://www.niftyindices.com/IndexConstituent/ind_nifty50list.csv" > ind_nifty50list.csv
        
        # 🔥 Force Update Trick: File ke aakhiri me ek invisible timestamp jodhna taaki GitHub ko har baar change dikhe
        echo "# Force Update Key: $(date)" >> ind_nifty50list.csv

    - name: Commit and Force Push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add ind_nifty50list.csv
        
        git commit -m "Official Nifty 50 CSV Force Updated" || exit 0
        git push origin main --force
