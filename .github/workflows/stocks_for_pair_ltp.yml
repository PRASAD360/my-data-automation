name: Hourly Pair CSV Generator

on:
  workflow_dispatch: # Isse aap GitHub par jaakar manually "Run workflow" button daba sakte hain
  schedule:
    # ⏱️ Automatic scheduling: Har 1 ghante me run hone ke liye (Monday se Friday)
    - cron: '0 * * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        pip install yfinance pandas

    - name: Execute Fast CSV Engine
      run: python fetch_pairs.py

    - name: Commit and Push CSV File
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add pair_data.csv
        git commit -m "Auto-updated pair data CSV from public sheet range" || exit 0
        git push
