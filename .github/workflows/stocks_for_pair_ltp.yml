name: Hourly Pair CSV Generator

on:
  workflow_dispatch: # Manual run ke liye
  schedule:
    # ⏱️ Automatic scheduling: Har 1 ghante me run hone ke liye (Monday se Friday)
    - cron: '0 * * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Libraries
      run: |
        pip install yfinance pandas

    - name: Execute Fast CSV Engine
      run: python fetch_pairs.py

    # 🎯 FIXED: Yahan syntax ekdum correct kar diya hai
    - name: Append Fetch Time Column
      run: |
        if [ -f pair_data.csv ]; then
          CURRENT_TIME=$(env TZ=Asia/Kolkata date "+%Y-%m-%d %H:%M:%S IST")
          echo "🕒 Force Overwrite Time Generated: $CURRENT_TIME"
          
          # Matrix structured CSV ke liye awk logic: Header me ,Fetch_Time jodna aur data rows me timestamp
          awk -v time="$CURRENT_TIME" 'NR==1 {print $0 ",Fetch_Time"} NR>1 {print $0 "," time}' pair_data.csv > temp_matrix.csv
          mv temp_matrix.csv pair_data.csv
        fi

    # 🚀 FORCE COMMIT & PUSH LOGIC
    - name: Commit and Force Push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add pair_data.csv
        git commit -m "Pair Data Matrix Force Updated" || exit 0
        git push origin main --force
