name: Auto Fetch Nifty Midcap 100 CSV

on:
  schedule:
    - cron: '30 19 * * *'  # 1:00 AM IST
    - cron: '30 0 * * *'   # 6:00 AM IST
    - cron: '30 2 * * *'   # 8:00 AM IST
  workflow_dispatch:

jobs:
  fetch_midcap100:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Fetch Nifty Midcap 100 and Add Timestamp
      run: |
        curl -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64)" "https://www.niftyindices.com/IndexConstituent/ind_niftymidcap100list.csv" > temp.csv
        CURRENT_TIME=$(env TZ=Asia/Kolkata date "+%Y-%m-%d %H:%M:%S IST")
        awk -v time="$CURRENT_TIME" 'NR==1 {print $0 ",Fetch_Time"} NR>1 {print $0 "," time}' temp.csv > ind_niftymidcap100list.csv
        rm temp.csv

    - name: Commit and Force Push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add ind_niftymidcap100list.csv
        git commit -m "Nifty Midcap 100 Force Updated" || exit 0
        git push origin main --force
